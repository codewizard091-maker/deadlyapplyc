<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadly Time | Apply</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --text-main: #d1d1d1;
            --text-dim: #888888;
            --accent-silver: #b0b0b0;
            --accent-purple: #b464ff;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #05000a; }
        ::-webkit-scrollbar-thumb { background: #1a0b2e; border-radius: 10px; border: 2px solid #05000a; }
        ::selection { background: rgba(180, 100, 255, 0.3); color: #fff; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #0a0510 50%, #000000 100%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        #network-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .card-wrapper {
            position: relative; padding: 1px;
            background: linear-gradient(0deg, transparent, var(--accent-purple), transparent);
            background-size: 100% 200%;
            animation: borderRotate 5s linear infinite;
            border-radius: 4px; z-index: 10;
            transition: transform 0.1s ease-out; /* Плавный возврат параллакса */
        }

        @keyframes borderRotate {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 200%; }
        }

        .card {
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(20, 10, 30, 0.95) 50%, rgba(10, 10, 10, 0.95) 100%);
            background-size: 200% 200%;
            animation: cardGradient 8s ease infinite;
            backdrop-filter: blur(20px); border-radius: 3px;
            padding: 40px 50px; width: 580px; box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        .card::-webkit-scrollbar { width: 4px; }
        .card::-webkit-scrollbar-thumb { background: var(--accent-purple); }

        @keyframes cardGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .jumping-title {
            font-weight: 900; font-size: 32px;
            text-transform: uppercase; letter-spacing: 8px; text-align: center;
            margin-bottom: 30px; cursor: default; color: #fff;
            display: flex; justify-content: center;
        }

        .jumping-title span {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), color 0.4s;
        }

        .jumping-title:hover span {
            animation: jump 0.35s ease infinite alternate;
        }

        @keyframes jump {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); color: var(--accent-purple); }
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            color: var(--accent-purple);
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            transition: 0.3s ease;
            outline: none;
            border-radius: 2px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-purple);
            background: rgba(180, 100, 255, 0.05);
        }

        textarea { height: 70px; resize: none; }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #a0a0a0;
            border: none;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 5px;
        }

        .submit-btn:hover {
            background: var(--accent-purple);
            color: #fff;
            box-shadow: 0 0 20px rgba(180, 100, 255, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #444;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--accent-purple); }
    </style>
</head>
<body>

    <canvas id="network-canvas"></canvas>

    <div class="card-wrapper" id="parallax-card">
        <div class="card">
            <h1 class="jumping-title">
                <span>З</span><span>А</span><span>Я</span><span>В</span><span>К</span><span>А</span>
                &nbsp;
                <span>В</span>&nbsp;<span>К</span><span>Л</span><span>А</span><span>Н</span>
            </h1>
            
            <form action="https://formspree.io/f/xgorzynv" method="POST">
                
                <div class="input-group">
                    <label>Почему вы хотите именно к нам?</label>
                    <textarea name="reason" required placeholder="Ответ на данный вопрос"></textarea>
                </div>

                <div class="input-group">
                    <label>Ваш ник / привилегия</label>
                    <input type="text" name="nickname_rank" required placeholder="halalskiy / ZamOwner">
                </div>

                <div class="input-group">
                    <label>Сколько вам лет?</label>
                    <input type="number" name="age" required placeholder="12">
                </div>

                <div class="input-group">
                    <label>Ваш часовой пояс?</label>
                    <input type="text" name="timezone" required placeholder="МСК +0">
                </div>

                <div class="input-group">
                    <label>В каких кланах вы были до нас?</label>
                    <textarea name="clans_history" required placeholder="Например: lovsky / smertnix"></textarea>
                </div>

                <div class="input-group">
                    <label>Ваш Discord / Telegram (username)</label>
                    <input type="text" name="contact" required placeholder="9ff09">
                </div>

                <button type="submit" class="submit-btn">ОТПРАВИТЬ ДАННЫЕ</button>
            </form>

            <a href="index.html" class="back-link">← Вернуться в магазин</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        const particleCount = 280; 
        const connectionRadius = 140; 
        const mouseRadius = 200; 
        const mouse = { x: null, y: null };

        // СЛАБЫЙ ПАРАЛЛАКС (делитель 75 вместо 35)
        const cardWrapper = document.getElementById('parallax-card');
        document.addEventListener('mousemove', e => {
            if (window.innerWidth > 768) {
                const xAxis = (window.innerWidth / 2 - e.clientX) / 75;
                const yAxis = (window.innerHeight / 2 - e.clientY) / 75;
                cardWrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
            mouse.x = e.clientX; mouse.y = e.clientY;
        });

        window.addEventListener('mousedown', (e) => {
            particles.forEach(p => {
                const dx = p.x - e.clientX;
                const dy = p.y - e.clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 350) {
                    const force = (350 - dist) / 15;
                    p.speedX += (dx / dist) * force;
                    p.speedY += (dy / dist) * force;
                }
            });
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1.8; 
                this.speedY = (Math.random() - 0.5) * 1.8;
            }
            update() {
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < mouseRadius) {
                        const force = (mouseRadius - dist) / mouseRadius;
                        this.x += (dx / dist) * force * 3.5;
                        this.y += (dy / dist) * force * 3.5;
                    }
                }
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > width || this.x < 0) this.speedX *= -1;
                if (this.y > height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(180, 100, 255, 0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionRadius) {
                        ctx.strokeStyle = `rgba(180, 100, 255, ${(1 - dist / connectionRadius) * 0.3})`;
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
        resize(); animate();
    </script>
</body>
</html>
